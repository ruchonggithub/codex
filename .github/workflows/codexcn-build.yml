name: codexCn release build

on:
  push:
    branches:
      - codexCn
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: read
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - uses: ./.github/actions/setup-ci
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Linux build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            binutils \
            libcap-dev \
            pkg-config

      - name: Build Codex
        run: cargo build --locked --target x86_64-unknown-linux-gnu --release --bin codex

      - name: Package Linux binary
        shell: bash
        run: |
          set -euo pipefail
          package_dir="${GITHUB_WORKSPACE}/dist/codexCn-linux-x86_64"
          mkdir -p "$package_dir"
          install -m 0755 \
            "${CARGO_TARGET_DIR}/x86_64-unknown-linux-gnu/release/codex" \
            "$package_dir/codex"
          tar -C "${GITHUB_WORKSPACE}/dist" \
            -czf "${GITHUB_WORKSPACE}/dist/codexCn-linux-x86_64.tar.gz" \
            codexCn-linux-x86_64

      - name: Upload Linux package
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codexCn-linux-x86_64
          path: dist/codexCn-linux-x86_64.tar.gz
          if-no-files-found: error

  build-windows:
    name: Build Windows x86_64
    runs-on: windows-2022
    timeout-minutes: 90
    permissions:
      contents: read
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Configure Windows build environment
        shell: pwsh
        run: |
          git config --global core.longpaths true
          "CARGO_NET_GIT_FETCH_WITH_CLI=true" >> $env:GITHUB_ENV
          "CARGO_TARGET_DIR=$env:GITHUB_WORKSPACE/codex-rs/target" >> $env:GITHUB_ENV
      - uses: facebook/install-dotslash@1e4e7b3e07eaca387acb98f1d4720e0bee8dbb6a # v2
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: x86_64-pc-windows-msvc
      - uses: ./.github/actions/setup-msvc-env
        with:
          target: x86_64-pc-windows-msvc

      - name: Build Codex
        shell: bash
        run: |
          set -euo pipefail
          export LIBSQLITE3_FLAGS=SQLITE_DISABLE_INTRINSIC
          cargo build \
            --locked \
            --target x86_64-pc-windows-msvc \
            --release \
            --bin codex

      - name: Package Windows binary
        shell: pwsh
        run: |
          $packageDir = Join-Path $env:RUNNER_TEMP "codexCn-windows-x86_64"
          $distDir = Join-Path $env:GITHUB_WORKSPACE "dist"
          $binary = Join-Path $env:CARGO_TARGET_DIR "x86_64-pc-windows-msvc\release\codex.exe"
          $archive = Join-Path $distDir "codexCn-windows-x86_64.zip"

          New-Item -ItemType Directory -Force -Path $packageDir, $distDir | Out-Null
          Copy-Item $binary (Join-Path $packageDir "codex.exe")
          Compress-Archive -Path (Join-Path $packageDir "codex.exe") -DestinationPath $archive -Force

      - name: Upload Windows package
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codexCn-windows-x86_64
          path: dist/codexCn-windows-x86_64.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs:
      - build-linux
      - build-windows
    if: ${{ !cancelled() && needs.build-linux.result == 'success' && needs.build-windows.result == 'success' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download build packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: codexCn-build-${{ github.run_number }}
          target_commitish: ${{ github.sha }}
          name: codexCn build ${{ github.run_number }}
          body: |
            Automated x86_64 builds from the `codexCn` branch.

            Source commit: `${{ github.sha }}`
          prerelease: true
          make_latest: false
          files: dist/*
          overwrite_files: true
